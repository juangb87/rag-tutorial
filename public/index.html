<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bumbei Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #FC6A42;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 20px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        .msg {
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user {
            background: #FC6A42;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: white;
            border: 1px solid #ddd;
        }

        .input-bar {
            padding: 16px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: #FC6A42;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e55a35;
        }

        .typing {
            color: #999;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="header">🐝 Bumbei Chat</div>
    <div class="chat" id="chat"></div>
    <div class="input-bar">
        <input type="text" id="input" placeholder="Pregúntame sobre Bumbei..."
            onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()">Enviar</button>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function send() {
            const q = input.value.trim();
            if (!q) return;
            input.value = '';
            addMsg(q, 'user');
            const typing = addMsg('Escribiendo...', 'bot typing');

            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q }),
            });
            const data = await res.json();
            typing.textContent = data.answer;
            typing.classList.remove('typing');
        }
    </script>
</body>

</html>
